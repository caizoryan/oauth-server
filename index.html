<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Are.na Meetup</title>
    <style>
		body {
			font-family: monospace;
		}

		:root {
			--bg: #CCE0BE;
			--col: #3A6F55;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		a {
			all: unset;
			color: orange;
			text-decoration: underline;
			cursor: pointer;
		}

		body {
			background: var(--bg);
			color: var(--col);
			max-width: 450px;
			margin: 4em auto;
		}

		h1 {
			border-bottom: 1px solid var(--col);
			margin-bottom: .5em;
			font-size: 2.4em;
		}

		.bar {
			height: 3em;
			width: 100%;
			display: flex;
			justify-content: space-between;
		}

		#buttons {
			display: flex;
			font-size: 2em;
		}
		#buttons button {
			padding: .5em;
			margin-right: .25em;
		}

		button {
			all: unset;
			border: 2px solid var(--col);
			display: flex;
			justify-content: center;
			align-items: center;
			cursor: pointer;
		}

		.controls {
			display: grid;
			padding: 10px 0;
			grid-template-columns: 1fr 1fr;
			gridGap: 50px
		}

		.container {
			margin: 0 auto;
		}

		.rsvp {
			padding: 25px;
			border: 2px solid var(--col);
			position: relative;
			margin: 3em 0;
		}

		.rsvp[authenticated='true'] .overlay {
			display: none;
		}
		.rsvp[authenticated='false'] .overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: var(--col);
			opacity: .90;
		}

		.centered {
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.overlay .box{
			/* width: 250px; */
			/* height: 250px; */
			background-color: #fff;
			font-size: 1.5em;
		}

		.box > * {
			padding: .25em;
			margin: .25em;
		}

		.rsvp-btn {
			width: 100%;
			height: 80px;
			background: var(--col);
			color: var(--bg);
			font-size: 2em;
			text-transform: lowercase;
		}

		.label {
			border: none;
		}

		#sliders > * {
			display: grid;
			grid-template-columns: 85px auto;
		}

		input[type="range"] {
			margin: auto;
			-webkit-appearance: none;
			position: relative;
			overflow: hidden;
			height: 30px;
			width: 200px;
			cursor: pointer;
			border-radius: 0;

			background: #1112;
			margin-right: 10px;
			margin-bottom: 2px;
			border: 2px solid var(--col);
		}

		.controls .label {
			padding: .25em;
			font-size: 1.2em;
			background-color: white;
			border: 2px solid var(--col);
			border-radius: 50px;
			font-weight: 600;
			margin: .25em;
			margin-right: 1em;
		}


		/*
	 * 1. Set to 0 width and remove border for a slider without a thumb
	 * 2. Shadow is negative the full width of the input and has a spread 
	 *    of the width of the input.
	 */
		::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 30px;
			/* 1 */
			height: 30px;
			background: #fff;
		}

		::-moz-range-track {
			height: 30px;
		}

		::-moz-range-thumb {
			background: #fff;
			height: 30px;
			width: 30px;
			box-sizing: border-box;
			border-radius: 0px !important;
			border: 2px var(--col) solid;
		}

		::-ms-fill-lower {
			background: #222;
		}

		::-ms-thumb {
			background: #fff;
			height: 30px;
			width: 30px;
			box-sizing: border-box;
		}

		::-ms-ticks-after {
			display: none;
		}

		::-ms-ticks-before {
			display: none;
		}

		::-ms-track {
			background: #2228;
			color: transparent;
			height: 40px;
			border: none;
		}

		::-ms-tooltip {
			display: none;
		}
    </style>
</head>
<body>

    <script type="module" src="script.js"></script>
</body>
</html>
