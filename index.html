<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are.na OAuth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #004494;
        }
        #status {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Are.na OAuth Demo</h1>
    
    <div id="status">Loading...</div>
    
    <button id="loginBtn" class="hidden">Login with Are.na</button>
    <button id="logoutBtn" class="hidden">Logout</button>
    
    <div id="userInfo" class="hidden">
        <h2>Your Profile</h2>
        <pre id="userDetails"></pre>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
