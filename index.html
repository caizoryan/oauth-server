<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Are.na Meetup</title>
    <style>
		body {
			font-family: monospace;
		}

		* {
			margin: 0;
			padding: 0;
		}

		a {
			all: unset;
			color: orange;
			text-decoration: underline;
			cursor: pointer;
		}

		body {
			background: #eee;
			color: black;
			max-width: 500px;
			margin: auto;
		}

		.bar {
			height: 3em;
			width: 100%;
			display: flex;
			justify-content: space-between;
		}

		#buttons {
			display: flex;
			font-size: 2em;
		}
		#buttons button {
			padding: .5em;
			margin-right: .25em;
		}

		button {
			all: unset;
			border: 1px solid black;
			display: flex;
			justify-content: center;
			align-items: center;
			cursor: pointer;
		}

		.controls {
			display: grid;
			padding: 10px 0;
			grid-template-columns: 6fr 1fr 1.5fr;
			gridGap: 50px
		}

		.container {
			margin: 0 auto;
		}

		input[type="range"] {
			margin: auto;
			-webkit-appearance: none;
			position: relative;
			overflow: hidden;
			height: 20px;
			width: 200px;
			cursor: pointer;
			border-radius: 0;

			background: #1112;
			margin-right: 10px;
			margin-bottom: 2px;
			border: 2px solid black;
		}

		.controls span {
			padding: 3px;
			border: 1px solid black;
			border-radius: 5px;
		}


		/*
	 * 1. Set to 0 width and remove border for a slider without a thumb
	 * 2. Shadow is negative the full width of the input and has a spread 
	 *    of the width of the input.
	 */
		::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 20px;
			/* 1 */
			height: 20px;
			background: #fff;
		}

		::-moz-range-track {
			height: 20px;
		}

		::-moz-range-thumb {
			background: #fff;
			height: 20px;
			width: 20px;
			box-sizing: border-box;
			border-radius: 0px !important;
			border: 1px black solid;
		}

		::-ms-fill-lower {
			background: #222;
		}

		::-ms-thumb {
			background: #fff;
			height: 20px;
			width: 20px;
			box-sizing: border-box;
		}

		::-ms-ticks-after {
			display: none;
		}

		::-ms-ticks-before {
			display: none;
		}

		::-ms-track {
			background: #2228;
			color: transparent;
			height: 40px;
			border: none;
		}

		::-ms-tooltip {
			display: none;
		}
    </style>
</head>
<body>

    <script type="module" src="script.js"></script>
</body>
</html>
